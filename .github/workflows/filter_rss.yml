name: Filter RSS Feeds

on:
  schedule:
    # UTC 19:00 = JST 04:00 に毎日実行
    - cron: '0 19 * * *'
  workflow_dispatch: # 手動実行可能にする

jobs:
  filter:
    runs-on: ubuntu-latest

    permissions:
      # コミット＆プッシュに write 権限が必要
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run RSS filter script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python filter_rss.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add openai-selection.xml anthropic-selection.xml
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update RSS selection feeds" && git push)
